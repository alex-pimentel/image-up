name: Security

on:
  workflow_call:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      - run: bandit -r app/ -x tests -s B104
      - run: pip-audit --strict -r requirements.txt --no-deps
